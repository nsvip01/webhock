<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clinical Triage Assistant</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #0b5cff;
      color: white;
      border: none;
      cursor: pointer;
    }

    .badge {
      padding: 5px 10px;
      border-radius: 5px;
    }

    .low { background: #d1fae5; }
    .moderate { background: #fef3c7; }
    .high { background: #fee2e2; }

    #resultSection { display: none; }

    #errorMsg { color: red; }
  </style>
</head>

<body>

<div class="container">

  <div class="card">
    <h2>Clinical Triage Assistant</h2>

    <form id="triageForm">
      <label>Pain Level</label>
      <input type="number" id="painLevel" required>

      <label>Blood Pressure</label>
      <input type="text" id="bloodPressure" placeholder="120/80" required>

      <label>Heart Rate</label>
      <input type="number" id="heartRate" required>

      <label>Temperature</label>
      <input type="number" step="0.1" id="temperature" required>

      <label>Respiratory Rate</label>
      <input type="number" id="respiratoryRate" required>

      <button type="submit" id="submitBtn">Analyze</button>
    </form>

    <div id="errorMsg"></div>
  </div>

  <div class="card" id="resultSection">
    <h3>Results</h3>

    <p><strong>Risk:</strong> <span id="risk"></span></p>
    <p><strong>Urgency:</strong> <span id="urgency"></span></p>
    <p><strong>Assessment:</strong> <span id="assessment"></span></p>
    <p><strong>Care Plan:</strong> <span id="care"></span></p>
  </div>

</div>

<script>

const N8N_WEBHOOK_URL = "https://aifl.fiuplus.cfd/webhook/TRAGE";

document.getElementById("triageForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const errorMsg = document.getElementById("errorMsg");
  errorMsg.innerText = "";

  const patientData = {
    painLevel: document.getElementById("painLevel").value,
    bloodPressure: document.getElementById("bloodPressure").value,
    heartRate: document.getElementById("heartRate").value,
    temperature: document.getElementById("temperature").value,
    respiratoryRate: document.getElementById("respiratoryRate").value
  };

  console.log("Sending:", patientData);

  try {

    const response = await fetch(N8N_WEBHOOK_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(patientData)
    });

    if (!response.ok) {
      throw new Error("Server error: " + response.status);
    }

    let result = await response.json();
    console.log("Raw Response:", result);

    // 🔥 دعم الحالتين
    let data = result;

    if (result.output) {
      if (typeof result.output === "string") {
        try {
          data = JSON.parse(result.output);
        } catch {
          data = { assessment: result.output };
        }
      } else {
        data = result.output;
      }
    }

    updateUI(data);

  } catch (error) {
    console.error(error);
    errorMsg.innerText = "Error: " + error.message;
  }

});

function updateUI(data) {

  document.getElementById("assessment").innerText = data.assessment || "N/A";
  document.getElementById("urgency").innerText = data.urgency || "N/A";
  document.getElementById("care").innerText =
    Array.isArray(data.initial_care_plan)
      ? data.initial_care_plan.join(", ")
      : data.initial_care_plan || "N/A";

  const risk = data.risk_level || "Unknown";
  const riskEl = document.getElementById("risk");

  let cls = "moderate";

  if (risk.toLowerCase().includes("low")) cls = "low";
  if (risk.toLowerCase().includes("high")) cls = "high";

  riskEl.innerHTML = `<span class="badge ${cls}">${risk}</span>`;

  document.getElementById("resultSection").style.display = "block";
}

</script>

</body>
</html>
